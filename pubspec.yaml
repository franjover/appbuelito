name: appbuelito
description: "App de acompanamiento diario para EPOC"
publish_to: 'none'
version: 1.2.1+5

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Navigation
  go_router: ^14.8.1

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Video
  video_player: ^2.9.2
  chewie: ^1.8.5

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Phone/SMS/URL
  url_launcher: ^6.3.1

  # Permissions
  permission_handler: ^11.3.1

  # Charts
  fl_chart: ^0.70.2

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.4

  # Sharing
  share_plus: ^10.1.4

  # Preferences
  shared_preferences: ^2.3.4

  # Date formatting
  intl: ^0.19.0

  # Timezone (for scheduled notifications)
  timezone: ^0.10.0

  # Connectivity
  connectivity_plus: ^6.1.1

  # Home screen widgets
  home_widget: ^0.7.0

  # Cloud sync (Supabase)
  supabase_flutter: ^2.8.0

  # Auto-update
  dio: ^5.7.0
  open_filex: ^4.5.0
  package_info_plus: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.22.1

flutter:
  uses-material-design: true

  assets:
    - assets/videos/
